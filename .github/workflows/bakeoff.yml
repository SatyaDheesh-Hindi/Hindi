name: Hindi Model Bake-off (throwaway)

# One-shot manual comparison of En->Hi models on a real 16GB runner.
# Not part of production. Delete once a model is chosen.

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Which model to test'
        type: choice
        options: [both, indictrans2, nllb]
        default: both

jobs:
  bakeoff:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU torch (runner has no GPU)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers sentencepiece sacremoses
          # IndicTrans2 pre/post-processing toolkit
          pip install git+https://github.com/VarunGumma/IndicTransToolkit.git || echo "toolkit install skipped (nllb-only run still works)"

      - name: Run bake-off
        run: |
          cd bakeoff
          python3 run_bakeoff.py "${{ github.event.inputs.model }}"

      - name: Commit results
        run: |
          git config user.email "satya-bot@github.com"
          git config user.name "Satya Bot"
          git add bakeoff/results.md bakeoff/results.json
          if ! git diff --staged --quiet; then
            git commit -m "Bake-off results [${{ github.event.inputs.model }}]"
            git push
          else
            echo "No result changes."
          fi

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: bakeoff-results
          path: |
            bakeoff/results.md
            bakeoff/results.json
